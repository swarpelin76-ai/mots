html,body{overflow-x:hidden;max-width:100vw;background:var(--bg0);color:var(--lbl);font-family:-apple-system,'Helvetica Neue',sans-serif;}
:root{
  --tint:#C9954A;--tint-dim:rgba(201,149,74,.15);--tint-glow:rgba(201,149,74,.28);
  --green:#30D158;--red:#FF453A;--blue:#0A84FF;
  --bg0:#E8EAED;--bg1:#ECEEF1;--bg2:#F4F5F7;--bg3:#FFFFFF;--bg4:#DDE0E5;
  --sep:rgba(0,0,0,.08);--lbl:rgba(0,0,0,.88);--lbl2:rgba(0,0,0,.55);
  --lbl3:rgba(0,0,0,.35);--lbl4:rgba(0,0,0,.12);
  --sh-light:#FFFFFF;--sh-dark:#C8CAD0;
  --neu:4px 4px 12px var(--sh-dark),-3px -3px 10px var(--sh-light);
  --neu-sm:2px 2px 6px var(--sh-dark),-1px -1px 5px var(--sh-light);
  --blur:saturate(200%) blur(24px);
  --r:12px;--r-lg:18px;--r-xl:24px;--r-pill:100px;
  --sp:cubic-bezier(.34,1.56,.64,1);--ease:cubic-bezier(.25,.46,.45,.94);
}
.page{display:none;min-height:100vh;padding-bottom:max(90px,calc(70px + env(safe-area-inset-bottom)));animation:fadeUp .25s var(--ease) both;}
.page.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

/* HEADER */
.hdr{padding:max(54px,env(safe-area-inset-top)) 20px 14px;background:rgba(236,238,241,.85);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);position:sticky;top:0;z-index:50;border-bottom:.5px solid var(--sep);}
.hdr-row{display:flex;align-items:center;justify-content:space-between;}
.hdr-left{}
.hdr-title{font-size:1.7rem;font-weight:700;letter-spacing:-.04em;line-height:1;}
.hdr-sub{font-size:.6rem;color:var(--lbl3);letter-spacing:.1em;text-transform:uppercase;margin-top:2px;}
.hdr-right{display:flex;align-items:center;gap:6px;}
.wk-prev,.wk-next{width:30px;height:30px;border-radius:50%;background:var(--bg2);border:none;color:var(--lbl2);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s var(--sp);box-shadow:var(--neu-sm);}
.wk-prev:active,.wk-next:active{transform:scale(.85);background:var(--bg3);}
.wk-prev:disabled,.wk-next:disabled{opacity:.3;pointer-events:none;}
.wk-badge{background:var(--bg2);border-radius:var(--r-pill);padding:6px 13px;font-size:.73rem;font-weight:600;color:var(--lbl2);border:.5px solid var(--sep);white-space:nowrap;}
.wk-badge.now{color:var(--tint);border-color:var(--tint-dim);}

/* DAYS */
.day-strip{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;}
.day-strip::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;min-width:56px;display:flex;flex-direction:column;align-items:center;gap:2px;padding:9px 10px;border-radius:var(--r);background:var(--bg1);box-shadow:var(--neu-sm);border:none;cursor:pointer;transition:all .22s var(--sp);}
.day-pill.active{background:var(--tint);border-color:transparent;transform:scale(1.06);box-shadow:0 5px 18px var(--tint-glow);}
.dp-name{font-size:.7rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.04em;}
.dp-date{font-size:.95rem;font-weight:700;color:var(--lbl2);}
.dp-dot{width:4px;height:4px;border-radius:50%;background:var(--tint);margin-top:1px;}
.day-pill.active .dp-name,.day-pill.active .dp-date{color:#000;}
.day-pill.active .dp-dot{background:rgba(0,0,0,.4);}

/* RING */
.ring-card{margin:0 16px 14px;background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);padding:18px;display:flex;align-items:center;gap:18px;}
.ring-wrap{position:relative;width:100px;height:100px;flex-shrink:0;}
.ring-outer{
  width:96px;height:96px;border-radius:50%;
  background:var(--bg1);
  box-shadow:5px 5px 14px var(--sh-dark),-4px -4px 12px var(--sh-light);
  display:flex;align-items:center;justify-content:center;
  position:relative;
  flex-shrink:0;
}
.ring-outer svg{transform:rotate(-90deg);position:absolute;width:88px;height:88px;}
.ring-track{fill:none;stroke:var(--sh-dark);stroke-width:6;}
.ring-prog{fill:none;stroke:var(--tint);stroke-width:6;stroke-linecap:round;stroke-dasharray:238.8;stroke-dashoffset:238.8;transition:stroke-dashoffset .7s var(--ease),stroke .3s;filter:drop-shadow(0 0 4px var(--tint-glow));}
.ring-prog.over{stroke:var(--red);}
.ring-inner{
  width:66px;height:66px;border-radius:50%;
  background:var(--bg1);
  box-shadow:inset 3px 3px 8px var(--sh-dark),inset -2px -2px 6px var(--sh-light);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:1;
}
.ring-val{font-size:1.3rem;font-weight:700;letter-spacing:-.04em;line-height:1;}
.ring-target{font-size:.78rem;color:var(--lbl3);font-weight:500;margin-top:1px;}
.ring-mid{display:contents;}
.ring-side{}
.rs-lbl{font-size:.72rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px;}
.rs-diff{font-size:1.7rem;font-weight:700;letter-spacing:-.04em;line-height:1;color:var(--tint);}
.rs-diff.over{color:var(--red);}
.rs-detail{font-size:.82rem;color:var(--lbl3);margin-top:2px;}

/* SECTION */
.sec-hd{padding:2px 20px 8px;display:flex;align-items:center;justify-content:space-between;}
.sec-lbl{font-size:.72rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;}
.sec-date{font-size:.72rem;color:var(--lbl3);}

/* TASKS */
.tasks{padding:0 16px;display:flex;flex-direction:column;gap:14px;}
.tc{background:var(--bg2);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);overflow:hidden;transition:box-shadow .2s;}
.tc.run{box-shadow:0 0 0 2px var(--tint),var(--neu);}
.tc.locked{box-shadow:0 0 0 2px rgba(52,199,89,.4),var(--neu);}
.tc-top{padding:18px 18px 12px;}
.tc-row1{display:flex;align-items:center;gap:8px;margin-bottom:3px;}
.tc-cl{flex:1;background:transparent;border:none;font-family:inherit;font-size:1.15rem;font-weight:800;color:var(--lbl);outline:none;letter-spacing:-.02em;min-width:0;}
.tc-cl::placeholder{color:var(--lbl4);font-weight:400;}
.tc-badge{flex-shrink:0;display:flex;align-items:center;gap:4px;font-size:.75rem;font-weight:600;padding:3px 9px;border-radius:var(--r-pill);background:var(--bg3);color:var(--lbl3);}
.tc-bdot{width:5px;height:5px;border-radius:50%;background:var(--bg4);}
.tc.run .tc-badge .tc-bdot{background:var(--tint);animation:pulse 1.4s infinite;}
.tc.locked .tc-badge{background:rgba(48,209,88,.1);color:var(--green);}
.tc.locked .tc-badge .tc-bdot{background:var(--green);animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.tc-obj{width:100%;background:transparent;border:none;font-family:inherit;font-size:.9rem;color:var(--lbl3);outline:none;padding:2px 0;}
.tc-obj::placeholder{color:var(--lbl4);}

/* Timer */
.tc-timer-sec{padding:14px 18px 16px;border-top:.5px solid var(--sep);}
.tc-time{font-size:2.8rem;font-weight:300;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1;margin-bottom:11px;transition:color .2s;}
.tc.run .tc-time{color:var(--tint);}
.tc-locked-sec{padding:14px 18px 16px;border-top:.5px solid var(--sep);display:flex;align-items:baseline;gap:10px;}
.tcl-val{font-size:2.5rem;font-weight:300;letter-spacing:-.04em;color:var(--green);line-height:1;}
.tcl-raw{font-size:.72rem;color:var(--lbl3);background:var(--bg3);padding:2px 8px;border-radius:5px;}

.tc-btns{display:flex;gap:7px;flex-wrap:wrap;}
.btn{display:inline-flex;align-items:center;gap:6px;height:42px;padding:0 16px;border-radius:var(--r-pill);border:none;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .18s var(--sp);white-space:nowrap;}
.btn:active{transform:scale(.92);opacity:.75;}
.btn svg{width:13px;height:13px;flex-shrink:0;}
.btn-play{background:#1A1C22;color:#FFFFFF;box-shadow:2px 2px 8px rgba(0,0,0,.2),-1px -1px 5px #FFFFFF;flex:1;justify-content:center;height:52px;font-size:1rem;border-radius:26px;}
.btn-pause{background:var(--bg1);color:var(--lbl);box-shadow:var(--neu-sm);border:none;flex:1;justify-content:center;height:52px;font-size:1rem;border-radius:26px;}
.btn-ghost{background:var(--bg1);color:var(--lbl2);box-shadow:var(--neu-sm);border:none;}
.btn-red{background:rgba(255,69,58,.08);color:var(--red);border:.5px solid rgba(255,69,58,.18);}
.btn-lock{background:var(--bg1);color:var(--lbl2);box-shadow:var(--neu-sm);border:none;}
.btn-locked{background:rgba(48,209,88,.1);color:var(--green);border:.5px solid rgba(48,209,88,.22);}
.btn-blue{background:var(--bg1);color:var(--lbl2);box-shadow:var(--neu-sm);border:none;}

.tc-manual{display:flex;align-items:center;gap:10px;padding:14px 18px 16px;border-top:.5px solid var(--sep);}
.tc-ml{font-size:.75rem;font-weight:700;color:var(--lbl3);text-transform:uppercase;letter-spacing:.08em;flex-shrink:0;}
.tc-mi{background:var(--bg3);border:.5px solid var(--sep);border-radius:7px;padding:5px 11px;font-family:inherit;font-size:.85rem;font-weight:600;color:var(--lbl);outline:none;width:76px;text-align:center;transition:border-color .2s;}
.tc-mi:focus{border-color:var(--tint);}
.tc-mh{font-size:.7rem;color:var(--lbl3);}

.tc-lock-row{padding:0 18px 16px;display:flex;gap:7px;flex-wrap:wrap;}

.add-task{display:flex;align-items:center;justify-content:center;gap:7px;margin:8px 16px;height:46px;border-radius:var(--r-xl);background:transparent;border:.5px dashed var(--sep);font-family:inherit;font-size:.85rem;font-weight:500;color:var(--lbl3);cursor:pointer;transition:all .18s;width:calc(100% - 32px);}
.add-task:active{background:var(--bg2);}
.add-task svg{stroke:var(--lbl3);fill:none;width:14px;height:14px;stroke-width:2;stroke-linecap:round;}

/* HORAIRES */
.hor{margin:14px 16px 8px;background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);overflow:hidden;}
.hor-fields{display:flex;}
.hor-f{flex:1;padding:13px 15px;background:var(--bg2);}
.hor-f:first-child{border-right:.5px solid var(--sep);}
.hor-lbl{font-size:.57rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;}
.hor-inp{background:transparent;border:none;font-family:inherit;font-size:1.25rem;font-weight:600;color:var(--lbl);outline:none;width:100%;-webkit-appearance:none;font-variant-numeric:tabular-nums;letter-spacing:-.03em;}
.hor-pause{padding:10px 15px;border-top:.5px solid var(--sep);}
.hor-pause-lbl{font-size:.57rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;}
.pause-btns{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;flex-wrap:nowrap;}
.pause-btns::-webkit-scrollbar{display:none;}
.pbtn{flex-shrink:0;height:28px;padding:0 11px;border-radius:var(--r-pill);border:.5px solid var(--sep);background:var(--bg3);font-family:inherit;font-size:.72rem;font-weight:600;color:var(--lbl3);cursor:pointer;transition:all .18s var(--sp);}
.pbtn.on{background:var(--tint);color:#000;border-color:transparent;}
.pbtn-c{flex-shrink:0;height:28px;padding:0 9px;border-radius:var(--r-pill);border:.5px solid var(--sep);background:var(--bg3);font-family:inherit;font-size:.72rem;font-weight:600;color:var(--lbl3);outline:none;width:52px;text-align:center;-webkit-appearance:none;}
.hor-dur{display:flex;align-items:center;justify-content:space-between;padding:10px 15px;border-top:.5px solid var(--sep);}
.hor-dur-info .hd-lbl{font-size:.72rem;color:var(--lbl3);}
.hor-dur-info .hd-rnd{font-size:.65rem;color:var(--lbl3);}
.hor-dur-val{font-size:1.45rem;font-weight:600;color:var(--tint);letter-spacing:-.03em;font-variant-numeric:tabular-nums;}

.notes-ta{width:100%;background:transparent;border:none;font-family:inherit;font-size:.85rem;color:var(--lbl2);resize:none;outline:none;padding:13px 15px;min-height:68px;line-height:1.5;}
.notes-ta::placeholder{color:var(--lbl4);}

/* WEEK */
.wk-wrap{padding:14px 16px;}
.wk-card{background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);margin-bottom:10px;overflow:hidden;}
.wk-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px 11px;border-bottom:.5px solid var(--sep);}
.wk-dn{font-size:.92rem;font-weight:700;letter-spacing:-.02em;}
.wk-dh{font-size:.72rem;color:var(--lbl3);margin-top:1px;}
.wk-cp{height:28px;padding:0 11px;border-radius:var(--r-pill);border:.5px solid var(--sep);background:var(--bg3);font-family:inherit;font-size:.7rem;font-weight:600;color:var(--lbl2);cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .18s;}
.wk-cp svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.wk-tasks-list{padding:7px 15px 9px;}
.wk-tr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:.5px solid var(--sep);}
.wk-tr:last-child{border:none;}
.wk-tn{font-size:.8rem;color:var(--lbl2);}
.wk-tt{font-size:.8rem;font-weight:700;color:var(--tint);font-variant-numeric:tabular-nums;}
.wk-empty-t{padding:7px 15px 9px;font-size:.78rem;color:var(--lbl4);font-style:italic;}
.wk-total-card{margin:0 0 14px;background:linear-gradient(135deg,var(--tint),#E8920A);border-radius:var(--r-xl);padding:15px 18px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 5px 20px var(--tint-glow);}
.wtc-l{font-size:.6rem;font-weight:600;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:.1em;}
.wtc-v{font-size:1.9rem;font-weight:700;color:#000;letter-spacing:-.04em;font-variant-numeric:tabular-nums;}

/* COPIER */
.cp-wrap{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.cp-card{background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);overflow:hidden;}
.cp-head{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 15px 9px;border-bottom:.5px solid var(--sep);}
.cp-dn{font-size:.9rem;font-weight:700;letter-spacing:-.02em;}
.cp-dh{font-size:.7rem;color:var(--lbl3);margin-top:1px;}
.cp-btn{height:28px;padding:0 11px;border-radius:var(--r-pill);border:.5px solid var(--sep);background:var(--bg3);font-family:inherit;font-size:.7rem;font-weight:600;color:var(--lbl2);cursor:pointer;display:flex;align-items:center;gap:4px;flex-shrink:0;transition:all .18s;}
.cp-btn svg{width:11px;height:11px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;}
.cp-lines{padding:9px 15px 11px;font-size:.8rem;color:var(--lbl3);line-height:1.8;white-space:pre-wrap;}
.cp-all{display:flex;align-items:center;justify-content:center;gap:7px;height:48px;border-radius:var(--r-xl);background:var(--tint);border:none;font-family:inherit;font-size:.88rem;font-weight:700;color:#000;cursor:pointer;transition:all .18s;box-shadow:0 5px 18px var(--tint-glow);}
.cp-all:active{transform:scale(.97);}
.cp-all svg{stroke:#000;fill:none;width:15px;height:15px;stroke-width:2;stroke-linecap:round;}

/* CLIENTS */
.cl-wrap{padding:14px 16px;}
.per-card{background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);margin-bottom:12px;overflow:hidden;}
.per-top{padding:13px 15px 10px;border-bottom:.5px solid var(--sep);}
.per-lbl{font-size:.57rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;}
.per-btns{display:flex;gap:5px;}
.per-btn{height:28px;padding:0 13px;border-radius:var(--r-pill);border:.5px solid var(--sep);background:var(--bg3);font-family:inherit;font-size:.72rem;font-weight:600;color:var(--lbl3);cursor:pointer;transition:all .18s var(--sp);}
.per-btn.on{background:var(--tint);color:#000;border-color:transparent;}
.per-dates{display:flex;align-items:center;gap:7px;padding:10px 15px;}
.per-inp{flex:1;height:34px;padding:0 11px;background:var(--bg2);border:.5px solid var(--sep);border-radius:8px;font-family:inherit;font-size:.8rem;color:var(--lbl);outline:none;-webkit-appearance:none;transition:border-color .18s;}
.per-inp:focus{border-color:var(--tint);}
.per-sep{font-size:.72rem;color:var(--lbl3);}
.per-ok{height:34px;padding:0 14px;border-radius:var(--r-pill);background:var(--tint);border:none;font-family:inherit;font-size:.8rem;font-weight:700;color:#000;cursor:pointer;flex-shrink:0;transition:all .18s;}
.filter-wrap{position:relative;margin-bottom:12px;}
.filter-ic{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:13px;height:13px;stroke:var(--lbl3);fill:none;stroke-width:2;stroke-linecap:round;pointer-events:none;}
.filter-inp{width:100%;height:38px;padding:0 13px 0 33px;background:var(--bg1);box-shadow:var(--neu-sm);border:none;border-radius:var(--r);font-family:inherit;font-size:.85rem;color:var(--lbl);outline:none;-webkit-appearance:none;transition:border-color .18s;}
.filter-inp:focus{border-color:var(--tint);}
.cl-total-card{background:linear-gradient(135deg,var(--tint),#E8920A);border-radius:var(--r-xl);padding:14px 17px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 5px 20px var(--tint-glow);}
.ctc-l{font-size:.58rem;font-weight:600;color:rgba(0,0,0,.5);text-transform:uppercase;letter-spacing:.1em;}
.ctc-p{font-size:.7rem;color:rgba(0,0,0,.4);margin-top:1px;}
.ctc-v{font-size:1.8rem;font-weight:700;color:#000;letter-spacing:-.04em;font-variant-numeric:tabular-nums;}
.cl-block{background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);margin-bottom:10px;overflow:hidden;}
.cl-block-head{display:flex;align-items:center;justify-content:space-between;padding:13px 15px 11px;border-bottom:.5px solid var(--sep);}
.cl-name{font-size:.95rem;font-weight:700;letter-spacing:-.02em;}
.cl-tot{font-size:.88rem;font-weight:700;color:var(--tint);font-variant-numeric:tabular-nums;}
.cl-row{display:flex;align-items:center;gap:8px;padding:8px 15px;border-bottom:.5px solid var(--sep);}
.cl-row:last-child{border:none;}
.cl-dt{font-size:.68rem;color:var(--lbl3);font-weight:500;flex-shrink:0;width:76px;}
.cl-ob{flex:1;font-size:.82rem;color:var(--lbl2);}
.cl-tm{font-size:.8rem;font-weight:700;color:var(--tint);font-variant-numeric:tabular-nums;flex-shrink:0;}
.cl-ck{font-size:.58rem;color:var(--green);background:rgba(48,209,88,.1);padding:1px 5px;border-radius:4px;flex-shrink:0;}
.empty-st{text-align:center;padding:40px 20px;color:var(--lbl3);}
.empty-st .ei{font-size:2.2rem;margin-bottom:10px;}
.empty-st .et{font-size:.88rem;font-weight:600;margin-bottom:5px;color:var(--lbl2);}
.empty-st .es{font-size:.78rem;color:var(--lbl4);}
.exp-btns{display:flex;gap:9px;margin-top:12px;}
.exp-btn{flex:1;height:46px;border-radius:var(--r-xl);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s;border:.5px solid var(--sep);}
.exp-btn:active{transform:scale(.97);}
.exp-cp{background:var(--bg2);color:var(--lbl);}
.exp-sv{background:var(--tint);color:#000;border-color:transparent;box-shadow:0 4px 14px var(--tint-glow);}
.exp-btn svg{stroke:currentColor;fill:none;width:14px;height:14px;stroke-width:2;stroke-linecap:round;}

/* RAPPELS */
.rp-wrap{padding:14px 16px;}
.rp-form{background:var(--bg1);border-radius:var(--r-xl);border:none;box-shadow:var(--neu);padding:15px;margin-bottom:14px;}
.rp-form-lbl{font-size:.57rem;font-weight:600;color:var(--lbl3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.rp-inp{width:100%;height:40px;padding:0 13px;background:var(--bg2);border:.5px solid var(--sep);border-radius:8px;font-family:inherit;font-size:.88rem;color:var(--lbl);outline:none;-webkit-appearance:none;margin-bottom:8px;transition:border-color .18s;}
.rp-inp:focus{border-color:var(--tint);}
.rp-add{width:100%;height:44px;background:var(--tint);color:#000;border:none;border-radius:var(--r-lg);font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer;transition:all .18s;}
.rp-add:active{transform:scale(.97);}
.rp-item{background:var(--bg1);border-radius:var(--r-lg);border:none;box-shadow:var(--neu-sm);border-left:3px solid var(--bg4);padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:11px;transition:all .2s;}
.rp-item.today{border-left-color:var(--tint);background:rgba(255,159,10,.05);animation:rpBlink 2s ease-in-out infinite;}
.rp-item.past{opacity:.45;}
@keyframes rpBlink{0%,100%{box-shadow:0 0 0 1px transparent;}50%{box-shadow:0 0 0 1.5px rgba(255,159,10,.35);}}
.rp-icon{font-size:1.3rem;flex-shrink:0;}
.rp-info{flex:1;min-width:0;}
.rp-date{font-size:.68rem;font-weight:700;color:var(--lbl3);margin-bottom:2px;}
.rp-date.today{color:var(--tint);}
.rp-msg{font-size:.9rem;font-weight:600;color:var(--lbl);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rp-del{width:28px;height:28px;border-radius:7px;background:var(--bg3);border:none;color:var(--red);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;}
.rp-empty{text-align:center;padding:30px 20px;color:var(--lbl4);font-size:.82rem;}

/* TAB BAR */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(236,238,241,.92);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-top:.5px solid var(--sep);display:flex;padding:7px 0 max(18px,env(safe-area-inset-bottom));}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;background:none;border:none;cursor:pointer;padding:4px 0;transition:all .18s;-webkit-appearance:none;appearance:none;outline:none;}
.tab svg{width:22px;height:22px;stroke:rgba(0,0,0,.35);fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;transition:all .22s var(--sp);}
.tab span{font-size:.68rem;font-weight:500;color:rgba(0,0,0,.35);letter-spacing:.02em;transition:color .18s;}
.tab.active svg{stroke:var(--tint);transform:scale(1.1);}
.tab.active span{color:var(--tint);font-weight:600;}
.tab.alert svg{stroke:var(--red);}
.tab.alert span{color:var(--red);}
.tab.alert{animation:tabAlert 1.8s ease-in-out infinite;}
@keyframes tabAlert{0%,100%{opacity:1;}50%{opacity:.55;}}

/* LIVE BANNER */
.live-banner{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(236,238,241,.92);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:.5px solid var(--sep);display:flex;align-items:center;justify-content:center;gap:10px;padding:max(52px,env(safe-area-inset-top)) 20px 10px;transform:translateY(-100%);transition:transform .35s var(--sp);}
.live-banner.on{transform:translateY(0);}
.live-dot{width:8px;height:8px;border-radius:50%;background:var(--tint);animation:pulse 1.4s infinite;flex-shrink:0;}
.live-task{font-size:.75rem;font-weight:600;color:var(--lbl2);flex:1;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.live-time{font-size:.75rem;font-weight:700;color:var(--tint);font-variant-numeric:tabular-nums;flex-shrink:0;} 

/* TOAST */
.notes-banner{
  position:fixed;top:0;left:0;right:0;z-index:150;
  background:var(--red);
  color:#fff;
  font-size:.85rem;font-weight:700;
  padding:max(52px,env(safe-area-inset-top)) 16px 10px;
  text-align:center;
  transform:translateY(-100%);
  transition:transform .3s var(--sp);
  line-height:1.4;
  box-shadow:0 4px 12px rgba(255,59,48,.4);
}
.notes-banner.show{transform:translateY(0);}
.notes-banner-close{
  position:absolute;right:14px;top:max(52px,env(safe-area-inset-top));
  background:rgba(255,255,255,.2);border:none;border-radius:50%;
  width:26px;height:26px;color:#fff;font-size:.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.toast{position:fixed;bottom:max(88px,calc(66px + env(safe-area-inset-bottom)));left:50%;transform:translateX(-50%) translateY(8px);background:rgba(50,50,55,.9);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);color:#fff;padding:10px 18px;border-radius:var(--r-pill);font-size:.82rem;font-weight:600;border:.5px solid var(--sep);opacity:0;transition:all .28s var(--sp);pointer-events:none;z-index:500;white-space:nowrap;box-shadow:0 6px 24px rgba(0,0,0,.15);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* INSTALL BANNER */
.install-ban{position:fixed;top:0;left:0;right:0;z-index:900;padding:max(52px,env(safe-area-inset-top)) 16px 14px;background:rgba(236,238,241,.95);backdrop-filter:var(--blur);-webkit-backdrop-filter:var(--blur);border-bottom:.5px solid var(--sep);transform:translateY(-100%);transition:transform .35s var(--sp);}
.install-ban.show{transform:translateY(0);}
.ib-row{display:flex;align-items:flex-start;gap:11px;}
.ib-steps{flex:1;font-size:.78rem;color:var(--lbl2);line-height:1.7;}
.ib-steps strong{color:var(--tint);}
.ib-close{width:26px;height:26px;border-radius:50%;background:var(--bg3);border:none;color:var(--lbl3);font-size:.82rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
</style>
</head>

<script>
// ═══════════════════════════════════════════
//  CONSTANTS & STATE
// ═══════════════════════════════════════════
var DAYS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi'];
var DS=['Lun','Mar','Mer','Jeu','Ven'];
var TARGET=525; // 8h45
var PAUSES=[0,15,30,45,60,75,90];
var RKEY='pmAlpes_rappels';
var TKEY='pmAlpes_timer';

var activeDay=0, activeTab=0, weekOffset=0;
var runningTimer=null, tickInterval=null;
var rapportWeeks=4, rapportData={};
var D=null, WD=[];

// ═══════════════════════════════════════════
//  WEEK UTILS
// ═══════════════════════════════════════════
function getMon(offset){
  var t=new Date(),dow=t.getDay();
  var mon=new Date(t);
  mon.setDate(t.getDate()-(dow===0?6:dow-1)+(offset||0)*7);
  mon.setHours(0,0,0,0);
  return mon;
}
function getWD(offset){
  var mon=getMon(offset);
  return Array.from({length:5},function(_,i){var d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function weekKey(offset){
  return 'pmAlpes_'+getMon(offset).toISOString().slice(0,10);
}

// ═══════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════
function defTask(seed,cl,obj){return{id:Date.now()+seed,client:cl,object:obj,elapsed:0,manual:'',recurring:true,locked:false};}
function defDay(i){return{start:'07:00',end:'17:00',pause:90,notes:'',tasks:[defTask(i*300+1,'Débitage standard',''),defTask(i*300+2,'Atelier bureau','Rangement / organisation')]};}
function defWeek(){return{days:DAYS.map(function(_,i){return defDay(i);})};}

function loadWeek(offset){
  weekOffset=offset;
  WD=getWD(offset);
  var key=weekKey(offset);
  var raw=null;
  try{raw=JSON.parse(localStorage.getItem(key)||'null');}catch(e){}
  D=raw||defWeek();
  // Migrate
  D.days.forEach(function(day,i){
    if(!day.tasks)day.tasks=[];
    day.tasks.forEach(function(t){
      if(!t.id)t.id=Date.now()+Math.random()*1000|0;
      if(t.elapsed==null)t.elapsed=0;
      if(t.manual==null)t.manual='';
      if(t.client==null){t.client=t.name||'';delete t.name;}
      if(t.object==null)t.object='';
      if(t.recurring)t.locked=false;
    });
    if(!day.tasks.length){
      day.tasks.push(defTask(i*300+1,'Débitage standard',''));
      day.tasks.push(defTask(i*300+2,'Atelier bureau','Rangement / organisation'));
    }
  });
  updateWkLabel();
  updateNavBtns();
}

function save(){
  var key=weekKey(weekOffset);
  try{localStorage.setItem(key,JSON.stringify(D));}catch(e){}
}

function updateWkLabel(){
  var el=document.getElementById('wkLabel');
  if(!el)return;
  var mon=getMon(weekOffset);
  var dd=mon.getDate().toString().padStart(2,'0');
  var mm=(mon.getMonth()+1).toString().padStart(2,'0');
  if(weekOffset===0){el.textContent='Sem. '+dd+'.'+mm;el.className='wk-badge now';}
  else if(weekOffset<0){el.textContent='◀ S'+Math.abs(weekOffset)+' '+dd+'.'+mm;el.className='wk-badge';}
  else{el.textContent='S'+weekOffset+' ▶ '+dd+'.'+mm;el.className='wk-badge';}
}

function updateNavBtns(){
  var p=document.getElementById('wkPrev');
  var n=document.getElementById('wkNext');
  if(p)p.disabled=(weekOffset<=-1);
  if(n)n.disabled=(weekOffset>=2);
}

function changeWeek(dir){
  var no=weekOffset+dir;
  if(no<-1||no>2)return;
  // Pause timer avant de changer
  if(runningTimer)commitTimer();
  save();
  loadWeek(no);
  buildDayStrip();
  buildDayView();
  if(activeTab===1)buildWeekView();
  if(activeTab===2)buildCopyView();
  showToast(weekOffset===0?'Semaine courante':(weekOffset<0?'Semaine précédente':'Semaine +'+weekOffset));
}

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════
function t2m(t){if(!t)return null;var p=t.split(':').map(Number);return p[0]*60+(p[1]||0);}
function m2hm(m){if(m==null||isNaN(m)||m<0)return '--h--';return Math.floor(m/60)+'h'+String(m%60).padStart(2,'0');}
function rQ(m){return Math.round(m/15)*15;}
function s2hms(s){var h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(ss).padStart(2,'0');}
function s2hm_rnd(s){var r=Math.round(s/60/15)*15;return Math.floor(r/60)+'h'+String(r%60).padStart(2,'0');}
function netMin(day){var s=t2m(day.start),e=t2m(day.end);if(!s||!e)return null;var r=e-s-(day.pause||0);return r>0?r:0;}
function rndMin(day){var n=netMin(day);return n==null?null:rQ(n);}
function taskLabel(t){var c=(t.client||'').trim(),o=(t.object||'').trim();if(c&&o)return c+' — '+o;return c||o||'Sans nom';}
function esc(s){return String(s||'').replace(/[&<"]/g,function(c){var m={'&':'&amp;','<':'&lt;','"':'&quot;'};return m[c]||c;});}

function roundManual(v){
  if(!v)return v;
  var s=v.trim();
  var mH=s.match(/^(\d+)h(\d*)$/);
  var mC=s.match(/^(\d+):(\d{2})$/);
  var mM=s.match(/^(\d+)$/);
  var tot=0;
  if(mH)tot=parseInt(mH[1])*60+(parseInt(mH[2]||'0')||0);
  else if(mC)tot=parseInt(mC[1])*60+parseInt(mC[2]);
  else if(mM)tot=parseInt(mM[1]);
  else return v;
  var r=Math.round(tot/15)*15;
  return Math.floor(r/60)+'h'+String(r%60).padStart(2,'0');
}

function showToast(msg,dur){
  if(!dur)dur=1800;
  var t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;t.classList.add('show');
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},dur);
}

// ═══════════════════════════════════════════
//  TIMER — persistant via localStorage
// ═══════════════════════════════════════════
function getLive(tid,di){
  var day=D.days[di];
  var t=day?day.tasks.find(function(t){return t.id===tid;}):null;
  if(!t)return 0;
  var e=t.elapsed||0;
  if(runningTimer&&runningTimer.taskId===tid&&runningTimer.dayIdx===di&&runningTimer.wk===weekOffset)
    e+=Math.floor((Date.now()-runningTimer.startedAt)/1000);
  return e;
}

function persistTimer(){
  if(runningTimer){
    try{localStorage.setItem(TKEY,JSON.stringify({taskId:runningTimer.taskId,dayIdx:runningTimer.dayIdx,startedAt:runningTimer.startedAt,wk:runningTimer.wk,weekKey:weekKey(runningTimer.wk)}));}catch(e){}
  }else{
    try{localStorage.removeItem(TKEY);}catch(e){}
  }
}

function restoreTimer(){
  try{
    var s=JSON.parse(localStorage.getItem(TKEY)||'null');
    if(!s||!s.startedAt)return;
    // Vérifier que la clé de semaine correspond à la semaine offset courante
    if(s.weekKey===weekKey(s.wk||0)){
      runningTimer={taskId:s.taskId,dayIdx:s.dayIdx,startedAt:s.startedAt,wk:s.wk||0};
    }
  }catch(e){}
}

function commitTimer(){
  if(!runningTimer)return;
  var tid=runningTimer.taskId,di=runningTimer.dayIdx,wk=runningTimer.wk||0;
  if(wk===weekOffset){
    var day=D.days[di];
    var t=day?day.tasks.find(function(t){return t.id===tid;}):null;
    if(t)t.elapsed=(t.elapsed||0)+Math.floor((Date.now()-runningTimer.startedAt)/1000);
  }
  clearInterval(tickInterval);tickInterval=null;runningTimer=null;
  persistTimer();
  save();
}

function startTimer(tid,di){
  if(runningTimer)commitTimer();
  runningTimer={taskId:tid,dayIdx:di,startedAt:Date.now(),wk:weekOffset};
  persistTimer();
  if(!tickInterval)tickInterval=setInterval(tick,1000);
  updateBanner();
  refreshTask(tid,di);
}

function pauseTimer(tid,di){
  if(!runningTimer||runningTimer.taskId!==tid||runningTimer.dayIdx!==di)return;
  commitTimer();
  updateBanner();
  refreshTask(tid,di);
}

function tick(){
  if(!runningTimer){clearInterval(tickInterval);tickInterval=null;return;}
  var tid=runningTimer.taskId,di=runningTimer.dayIdx;
  var disp=document.getElementById('td_'+tid);
  if(disp)disp.textContent=s2hms(getLive(tid,di));
  var lt=document.getElementById('liveTime');if(lt)lt.textContent=s2hms(getLive(tid,di));
  repaintRing(di);
  if(activeTab===2)buildCopyView();
}

function updateBanner(){
  var b=document.getElementById('liveBanner');if(!b)return;
  if(!runningTimer){b.classList.remove('on');return;}
  var day=D.days[runningTimer.dayIdx];
  var t=day?day.tasks.find(function(x){return x.id===runningTimer.taskId;}):null;
  var lt=document.getElementById('liveTask');if(lt)lt.textContent=(t?(t.client||t.object||'Tâche'):'Tâche').slice(0,22);
  var ltime=document.getElementById('liveTime');if(ltime)ltime.textContent=s2hms(getLive(runningTimer.taskId,runningTimer.dayIdx));
  b.classList.add('on');
}

// ═══════════════════════════════════════════
//  RING
// ═══════════════════════════════════════════
var CIRC=238.8;
function repaintRing(di){
  var day=D.days[di];
  // Ring = total des tâches avec temps réel (timer ou manuel non vide)
  var taskMin=0;
  day.tasks.forEach(function(t){
    var el=getLive(t.id,di);
    if(t.recurring && !t.manual && el===0) return;
    var dur;
    if(t.manual) dur=roundManual(t.manual);
    else if(el>0) dur=s2hm_rnd(el);
    else return;
    if(!dur)return;
    var mH=dur.match(/^(\d+)h(\d*)$/);
    if(mH)taskMin+=parseInt(mH[1])*60+(parseInt(mH[2]||'0')||0);
  });
  var r=Math.round(taskMin/15)*15;
  var pct=Math.min(1,r/TARGET);
  var prog=document.getElementById('ringProg');
  if(prog){
    prog.style.strokeDashoffset=CIRC*(1-pct);
    prog.classList.toggle('over',r>TARGET);
    prog.style.opacity=r>0?'1':'0';
  }
  var rv=document.getElementById('ringVal');if(rv)rv.textContent=r?m2hm(r):'—';
  var diff=r-TARGET;
  var rd=document.getElementById('rsDiff');var rdet=document.getElementById('rsDetail');
  if(rd){
    if(!r){rd.textContent='Pas encore saisi';rd.className='rs-diff';rd.style.fontSize='.85rem';rd.style.color='var(--lbl3)';rd.style.fontStyle='italic';rd.style.fontWeight='400';}
    else if(diff>=0){rd.textContent='+'+m2hm(diff);rd.className='rs-diff';rd.style.fontSize='';rd.style.color='';rd.style.fontStyle='';rd.style.fontWeight='';}
    else{rd.textContent='−'+m2hm(Math.abs(diff));rd.className='rs-diff over';rd.style.fontSize='';rd.style.color='';rd.style.fontStyle='';rd.style.fontWeight='';}
  }
  if(rdet)rdet.textContent=r?(m2hm(r)+' · arrondi ¼h'):'8h45 · arrondi ¼h';
}

  var elRaw=s2hms(el);

    ?('<div class="tc-locked-sec"><span class="tcl-val">'+(t.manual||elRnd)+'</span><span class="tcl-raw">brut '+elRaw+'</span></div>')
    :('<div class="tc-timer-sec"><div class="tc-time" id="td_'+t.id+'">'+elRaw+'</div>'

        :(el>0

          :'<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21"/></svg>Démarrer'))
      +'</button>'
      +'<button class="btn btn-ghost" data-rid="'+t.id+'" data-di="'+i+'">'
      +'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>'
      +'Remettre à zéro</button>'
      +(canCarry?'<button class="btn btn-blue" data-carry="'+t.id+'" data-di="'+i+'">'+(t.carriedTo?'✓ Reporté':'↷ '+nextLabel)+'</button>':'')
      +'<button class="btn btn-red" data-del="'+t.id+'">Supprimer</button>'

  var manualHTML=isL?'':('<div class="tc-manual">'
    +'<span class="tc-ml">Manuel</span>'
    +'<input class="tc-mi" type="text" value="'+esc(t.manual||'')+'" placeholder="2h30" data-f="manual" data-id="'+t.id+'">'
    +'<span class="tc-mh">prioritaire</span>'
    +'</div>');

  return '<div class="tc'+(isR?' run':'')+(isL?' locked':'')+'" id="ti_'+t.id+'">'
    +'<div class="tc-top">'
    +'<div class="tc-row1">'
    +'<input class="tc-cl" type="text" value="'+esc(t.client||'')+'" placeholder="Nom du client…" data-f="client" data-id="'+t.id+'"'+(isL?' readonly':'')+'>'
    +'<span class="tc-badge"><span class="tc-bdot"></span>'+(isL?'Validé':'En cours')+'</span>'
    +'</div>'

    +'</div>'
    +timerHTML+manualHTML

    +'<button class="btn '+(isL?'btn-locked':'btn-lock')+'" data-lock="'+t.id+'" data-di="'+i+'">'

function buildDayView(){
  var i=activeDay;var day=D.days[i];var d=WD[i];
  var sl=document.getElementById('secLbl');
  var sd=document.getElementById('secDate');
  if(sl)sl.textContent='Tâches · '+DAYS[i];
  if(sd)sd.textContent=d.getDate().toString().padStart(2,'0')+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getFullYear();

  var wrap=document.getElementById('tasksWrap');
  if(wrap){
    wrap.innerHTML=day.tasks.map(function(t){return taskCardHTML(t,i);}).join('')
      +'<button class="add-task" id="addTaskBtn"><svg viewBox="0 0 24 24" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouvelle tâche</button>';
    attachTaskEvents(i);
  }
  buildHoraires(i);
  var na=document.getElementById('notesArea');
  if(na){
    na.value=day.notes||'';
    na.oninput=function(){D.days[i].notes=na.value;save();updateNotesBanner(i);};
  }
  updateNotesBanner(i);
  repaintRing(i);
}

function attachTaskEvents(i){
  var wrap=document.getElementById('tasksWrap');if(!wrap)return;
  // Add task
  var ab=document.getElementById('addTaskBtn');
  if(ab)ab.onclick=function(){
    D.days[i].tasks.push({id:Date.now(),client:'',object:'',elapsed:0,manual:'',recurring:false,locked:false});
    save();buildDayView();
  };
  // Play/pause
  wrap.querySelectorAll('[data-tid]').forEach(function(btn){
    btn.onclick=function(){
      var tid=parseInt(btn.dataset.tid),di=parseInt(btn.dataset.di);
      var isR=runningTimer&&runningTimer.taskId===tid&&runningTimer.dayIdx===di&&runningTimer.wk===weekOffset;
      if(isR)pauseTimer(tid,di);else startTimer(tid,di);
      buildDayView();repaintRing(i);
    };
  });
  // Reset
  wrap.querySelectorAll('[data-rid]').forEach(function(btn){
    btn.onclick=function(){
      if(!confirm('Remettre à zéro ?'))return;
      var tid=parseInt(btn.dataset.rid),di=parseInt(btn.dataset.di);
      if(runningTimer&&runningTimer.taskId===tid&&runningTimer.dayIdx===di){runningTimer=null;clearInterval(tickInterval);tickInterval=null;persistTimer();}
      var t=D.days[di].tasks.find(function(t){return t.id===tid;});
      if(t)t.elapsed=0;
      save();buildDayView();repaintRing(i);updateBanner();
    };
  });
  // Delete
  wrap.querySelectorAll('[data-del]').forEach(function(btn){
    btn.onclick=function(){
      if(!confirm('Supprimer ?'))return;
      var tid=parseInt(btn.dataset.del);
      if(runningTimer&&runningTimer.taskId===tid){runningTimer=null;clearInterval(tickInterval);tickInterval=null;persistTimer();}
      D.days[i].tasks=D.days[i].tasks.filter(function(t){return t.id!==tid;});
      save();buildDayView();repaintRing(i);
    };
  });
  // Lock
  wrap.querySelectorAll('[data-lock]').forEach(function(btn){
    btn.onclick=function(){
      var tid=parseInt(btn.dataset.lock),di=parseInt(btn.dataset.di);
      var t=D.days[di].tasks.find(function(t){return t.id===tid;});
      if(!t)return;
      if(t.locked){t.locked=false;}
      else{
        if(runningTimer&&runningTimer.taskId===tid)pauseTimer(tid,di);
        t.locked=true;
        if(!t.manual&&t.elapsed>0)t.manual=s2hm_rnd(t.elapsed);
        else if(t.manual)t.manual=roundManual(t.manual);
      }
      save();buildDayView();buildWeekView();buildCopyView();
    };
  });
  // Carry
  wrap.querySelectorAll('[data-carry]').forEach(function(btn){
    btn.onclick=function(){
      var tid=parseInt(btn.dataset.carry),di=parseInt(btn.dataset.di);
      var t=D.days[di].tasks.find(function(t){return t.id===tid;});
      if(!t||t.carriedTo)return;
      var ni=di===4?0:di+1;
      var copy=JSON.parse(JSON.stringify(t));
      copy.id=Date.now();copy.elapsed=0;copy.manual='';copy.carriedFrom=tid;copy.locked=false;copy.carriedTo=null;
      t.carriedTo=copy.id;
      if(di<4)D.days[ni].tasks.push(copy);
      save();buildDayView();showToast('↷ Reporté à '+DAYS[ni==='0'?0:ni]);
    };
  });
  // Inputs
  wrap.querySelectorAll('[data-f]').forEach(function(el){
    el.oninput=function(){
      var id=parseInt(el.dataset.id),f=el.dataset.f;
      var t=D.days[i].tasks.find(function(t){return t.id===id;});
      if(t){t[f]=el.value;if(f!=='manual'){save();buildWeekView();buildCopyView();}}
    };
    if(el.dataset.f==='manual'){
      el.onblur=function(){
        var id=parseInt(el.dataset.id);
        var t=D.days[i].tasks.find(function(t){return t.id===id;});
        if(t&&el.value){el.value=roundManual(el.value);t.manual=el.value;save();buildWeekView();buildCopyView();}
      };
    }
  });
}

function refreshTask(tid,di){
  var card=document.getElementById('ti_'+tid);if(!card)return;
  var t=D.days[di].tasks.find(function(t){return t.id===tid;});if(!t)return;
  var tmp=document.createElement('div');tmp.innerHTML=taskCardHTML(t,di);
  card.replaceWith(tmp.firstElementChild);
  attachTaskEvents(di);
}

function buildHoraires(i){
  var hc=document.getElementById('horCard');if(!hc)return;
  var day=D.days[i];
  var n=netMin(day),r=rndMin(day);
  var pb=PAUSES.map(function(p){return '<button class="pbtn'+(day.pause===p?' on':'')+'" data-p="'+p+'">'+p+'m</button>';}).join('');
  pb+='<input class="pbtn-c" type="number" min="0" max="360" value="'+(PAUSES.includes(day.pause)?'':day.pause)+'" placeholder="…">';
  hc.innerHTML='<div class="hor-fields">'
    +'<div class="hor-f"><div class="hor-lbl">Début</div><input class="hor-inp" type="time" value="'+(day.start||'')+'" data-f="start"></div>'
    +'<div class="hor-f"><div class="hor-lbl">Fin</div><input class="hor-inp" type="time" value="'+(day.end||'')+'" data-f="end"></div>'
    +'</div>'
    +'<div class="hor-pause"><div class="hor-pause-lbl">Pause</div><div class="pause-btns" id="pauseBtns">'+pb+'</div></div>'
    +'<div class="hor-dur" id="horDur">'
    +'<div class="hor-dur-info"><div class="hd-lbl">Durée nette</div><div class="hd-rnd">Arrondie ¼h → <strong>'+(r!=null?m2hm(r):'—')+'</strong></div></div>'
    +'<div class="hor-dur-val">'+(n!=null?m2hm(n):'—')+'</div>'
    +'</div>';

  function updateDur(){
    var dur=document.getElementById('horDur');if(!dur)return;
    var n2=netMin(day),r2=rndMin(day);
    dur.innerHTML='<div class="hor-dur-info"><div class="hd-lbl">Durée nette</div><div class="hd-rnd">Arrondie ¼h → <strong>'+(r2!=null?m2hm(r2):'—')+'</strong></div></div><div class="hor-dur-val">'+(n2!=null?m2hm(n2):'—')+'</div>';
    repaintRing(i);buildWeekView();buildCopyView();
  }

  hc.querySelectorAll('.hor-inp').forEach(function(inp){
    inp.onchange=function(){D.days[i][inp.dataset.f]=inp.value;save();updateDur();};
  });
  var pb_wrap=document.getElementById('pauseBtns');
  if(pb_wrap){
    pb_wrap.querySelectorAll('.pbtn').forEach(function(btn){
      btn.onclick=function(){
        D.days[i].pause=parseInt(btn.dataset.p);save();
        pb_wrap.querySelectorAll('.pbtn').forEach(function(b){b.classList.toggle('on',parseInt(b.dataset.p)===D.days[i].pause);});
        updateDur();
      };
    });
    var pc=pb_wrap.querySelector('.pbtn-c');
    if(pc)pc.onchange=function(){
      var v=parseInt(pc.value);if(!isNaN(v)){D.days[i].pause=v;save();}
      pb_wrap.querySelectorAll('.pbtn').forEach(function(b){b.classList.remove('on');});
      updateDur();
    };
  }
}

function buildWeekView(){
  var wrap=document.getElementById('wkWrap');if(!wrap)return;
  var total=0;var html='';
  DAYS.forEach(function(_,i){
    var day=D.days[i];var d=WD[i];
    var r=rndMin(day);if(r)total+=r;
    var dn=DAYS[i]+' '+d.getDate().toString().padStart(2,'0')+'.'+(d.getMonth()+1).toString().padStart(2,'0')+'.'+d.getFullYear();
    var dh=day.start&&day.end?(day.start+' → '+day.end+(r?' · '+m2hm(r):'')):'—';
    var rows='';var hasT=false;
    day.tasks.forEach(function(t){
      var el=getLive(t.id,i);var dur=t.manual||(el>0?s2hm_rnd(el):null);if(!dur)return;
      var lbl=taskLabel(t);if(lbl==='Sans nom')return;
      rows+='<div class="wk-tr"><span class="wk-tn">'+esc(lbl)+'</span><span class="wk-tt">'+dur+'</span></div>';
      hasT=true;
    });
    html+='<div class="wk-card"><div class="wk-head"><div><div class="wk-dn">'+dn+'</div><div class="wk-dh">'+dh+'</div></div>'
      +'<button class="wk-cp" data-wi="'+i+'"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copier</button>'
      +'</div>'+(hasT?'<div class="wk-tasks-list">'+rows+'</div>':'<div class="wk-empty-t">Aucune tâche saisie</div>')
      +'</div>';
  });
  html+='<div class="wk-total-card"><div class="wtc-l">Total semaine</div><div class="wtc-v">'+m2hm(total)+'</div></div>';
  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-wi]').forEach(function(btn){
    btn.onclick=function(){copyDay(parseInt(btn.dataset.wi));};
  });
}

// ═══════════════════════════════════════════
//  COPY VIEW
// ═══════════════════════════════════════════
function dayLines(i){
  var day=D.days[i];var d=WD[i];
  var lines=[];
  var dn=DAYS[i]+' '+d.getDate().toString().padStart(2,'0')+'.'+(d.getMonth()+1).toString().padStart(2,'0');
  lines.push(dn);
  var r=rndMin(day);
  if(day.start&&day.end)lines.push(day.start+' → '+day.end+(r?' ('+m2hm(r)+')':''));
  day.tasks.forEach(function(t){
    var el=getLive(t.id,i);var dur=t.manual||(el>0?s2hm_rnd(el):null);if(!dur)return;
    var lbl=taskLabel(t);if(lbl==='Sans nom')return;
    if(t.recurring&&!dur)return;
    lines.push(lbl+' : '+dur);
  });
  if(day.notes)lines.push('Notes: '+day.notes);
  return lines;
}

function copyDay(i){
  var text=dayLines(i).join('\n');
  navigator.clipboard.writeText(text).then(function(){showToast('✓ Copié');}).catch(function(){showToast(text,3000);});
}

function buildCopyView(){
  var wrap=document.getElementById('cpWrap');if(!wrap)return;
  var html='';
  DAYS.forEach(function(_,i){
    var day=D.days[i];var d=WD[i];var r=rndMin(day);
    var dn=DAYS[i]+' '+d.getDate().toString().padStart(2,'0')+'.'+(d.getMonth()+1).toString().padStart(2,'0');
    var dh=day.start&&day.end?(day.start+' → '+day.end+(r?' · '+m2hm(r):'')):'Horaires non renseignés';
    var lines=[];
    day.tasks.forEach(function(t){
      var el=getLive(t.id,i);var dur=t.manual||(el>0?s2hm_rnd(el):null);if(!dur)return;
      var lbl=taskLabel(t);if(lbl==='Sans nom')return;
      if(t.recurring&&!dur)return;
      lines.push(lbl+' : '+dur);
    });
    html+='<div class="cp-card"><div class="cp-head"><div><div class="cp-dn">'+dn+'</div><div class="cp-dh">'+dh+'</div></div>'
      +'<button class="cp-btn" data-ci="'+i+'"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copier</button>'
      +'</div><div class="cp-lines">'+(lines.length?lines.join('\n'):'Aucune tâche')+'</div></div>';
  });
  html+='<button class="cp-all" id="cpAll"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>Copier toute la semaine</button>';
  wrap.innerHTML=html;
  wrap.querySelectorAll('[data-ci]').forEach(function(btn){btn.onclick=function(){copyDay(parseInt(btn.dataset.ci));};});
  var ca=document.getElementById('cpAll');
  if(ca)ca.onclick=function(){
    var all=DAYS.map(function(_,i){return dayLines(i).join('\n');}).join('\n\n');
    navigator.clipboard.writeText(all).then(function(){showToast('✓ Semaine copiée');}).catch(function(){alert(all);});
  };
}

  else from.setFullYear(2020);

function getAllKeys(fd,td){
  var keys=[];
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(!k||!k.startsWith('pmAlpes_'))continue;
    if(k===RKEY||k===TKEY)continue;
    var d=new Date(k.replace('pmAlpes_',''));
    if(d>=fd&&d<=td)keys.push(k);
  }
  return keys.sort();
}
function tsm(s){if(!s)return 0;var mH=s.match(/^(\d+)h(\d*)$/);var mC=s.match(/^(\d+):(\d{2})$/);if(mH)return parseInt(mH[1])*60+(parseInt(mH[2]||'0')||0);if(mC)return parseInt(mC[1])*60+parseInt(mC[2]);return 0;}
function buildRapport(){
  try{
    var rf=document.getElementById('rFrom');var rt=document.getElementById('rTo');
    if(!rf||!rt)return;
    var fv=rf.value,tv=rt.value;if(!fv||!tv)return;
    var fd=new Date(fv);var td=new Date(tv);td.setHours(23,59,59);
    var filter=(document.getElementById('rFilter')||{}).value||'';filter=filter.toLowerCase().trim();
    var keys=getAllKeys(fd,td);
    var cm={};
    keys.forEach(function(key){
      var wd=null;try{wd=JSON.parse(localStorage.getItem(key)||'null');}catch(e){}
      if(!wd)return;
      var mon=new Date(key.replace('pmAlpes_',''));
      wd.days.forEach(function(day,di){
        var dd=new Date(mon);dd.setDate(mon.getDate()+di);
        if(dd<fd||dd>td)return;
        var ds=dd.toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'});
        day.tasks.forEach(function(t){
          var cl=(t.client||'').trim();
          if(!cl||cl==='Débitage standard'||cl==='Atelier bureau')return;
          var ts=t.manual||(t.elapsed>0?s2hm_rnd(t.elapsed):null);if(!ts)return;
          if(filter&&cl.toLowerCase().indexOf(filter)===-1)return;
          if(!cm[cl])cm[cl]=[];
          cm[cl].push({date:ds,objet:(t.object||'').trim(),ts:ts,locked:t.locked||false});
        });
      });
    });
    rapportData=cm;
    var wrap=document.getElementById('rapportWrap');
    var exp=document.getElementById('rapportExport');
    if(!wrap)return;
    var clients=Object.keys(cm).sort();
    if(!clients.length){
      wrap.innerHTML='<div class="empty-st"><div class="ei">🔍</div><div class="et">Aucun client trouvé</div><div class="es">Ajoutez des noms de clients à vos tâches</div></div>';
      if(exp)exp.style.display='none';return;
    }
    var gt=0;clients.forEach(function(cl){cm[cl].forEach(function(r){gt+=tsm(r.ts);});});
    var fd2=new Date(fv).toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'});
    var td2=new Date(tv).toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'});
    var html='<div class="cl-total-card"><div><div class="ctc-l">Total période</div><div class="ctc-p">'+fd2+' → '+td2+'</div></div><div class="ctc-v">'+m2hm(gt)+'</div></div>';
    clients.forEach(function(cl){
      var rows=cm[cl];var tot=rows.reduce(function(s,r){return s+tsm(r.ts);},0);
      var rh=rows.map(function(r){return '<div class="cl-row"><div class="cl-dt">'+r.date+'</div><div class="cl-ob">'+(r.objet||'—')+'</div><div class="cl-tm">'+r.ts+'</div>'+(r.locked?'<span class="cl-ck">✓</span>':'')+'</div>';}).join('');
      html+='<div class="cl-block"><div class="cl-block-head"><div class="cl-name">'+esc(cl)+'</div><div class="cl-tot">'+m2hm(tot)+'</div></div>'+rh+'</div>';
    });
    wrap.innerHTML=html;
    if(exp)exp.style.display='flex';
  }catch(e){var w=document.getElementById('rapportWrap');if(w)w.innerHTML='<div style="padding:20px;color:var(--red);font-size:.85rem;">'+e.message+'</div>';}
}
function rapportText(){
  var rf=document.getElementById('rFrom'),rt=document.getElementById('rTo');
  var fd=rf?new Date(rf.value).toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
  var td=rt?new Date(rt.value).toLocaleDateString('fr-CH',{day:'2-digit',month:'2-digit',year:'numeric'}):'';
  var txt='RAPPORT PM ALPES SA\nPériode: '+fd+' → '+td+'\n'+'═'.repeat(36)+'\n\n';
  var gt=0;
  Object.keys(rapportData).sort().forEach(function(cl){
    var rows=rapportData[cl];var tot=rows.reduce(function(s,r){return s+tsm(r.ts);},0);gt+=tot;
    txt+='▸ '+cl+' — '+m2hm(tot)+'\n';
    rows.forEach(function(r){txt+='  '+r.date+'  '+(r.objet?r.objet+' ':'')+': '+r.ts+(r.locked?' ✓':'')+'\n';});
    txt+='\n';
  });
  txt+='═'.repeat(36)+'\nTOTAL: '+m2hm(gt)+'\n';
  return txt;
}
function copyRapport(){navigator.clipboard.writeText(rapportText()).then(function(){showToast('✓ Rapport copié');});}
function exportRapport(){
  var b=new Blob([rapportText()],{type:'text/plain'});var a=document.createElement('a');a.href=URL.createObjectURL(b);
  var rf=document.getElementById('rFrom'),rt=document.getElementById('rTo');
  a.download='Rapport_PMAlpes_'+(rf?rf.value:'')+'-'+(rt?rt.value:'')+'.txt';a.click();showToast('✓ Exporté');
}

// ═══════════════════════════════════════════
//  RAPPELS
// ═══════════════════════════════════════════
function getRappels(){try{return JSON.parse(localStorage.getItem(RKEY)||'[]');}catch(e){return [];}}
function setRappels(r){try{localStorage.setItem(RKEY,JSON.stringify(r));}catch(e){}}
function addRappel(){
  var d=document.getElementById('rpDate'),m=document.getElementById('rpMsg');
  if(!d||!m)return;
  if(!d.value){showToast('Choisissez une date');return;}
  if(!m.value.trim()){showToast('Entrez un message');return;}
  var r=getRappels();r.push({id:Date.now(),date:d.value,msg:m.value.trim()});
  r.sort(function(a,b){return a.date.localeCompare(b.date);});
  setRappels(r);d.value='';m.value='';
  buildRappels();showToast('✓ Rappel ajouté');checkAlerts();
}
function delRappel(id){setRappels(getRappels().filter(function(r){return r.id!==id;}));buildRappels();checkAlerts();}
function buildRappels(){
  var wrap=document.getElementById('rpList');if(!wrap)return;
  var r=getRappels();var today=new Date().toISOString().slice(0,10);
  if(!r.length){wrap.innerHTML='<div class="rp-empty">Aucun rappel</div>';return;}
  wrap.innerHTML=r.map(function(item){
    var isT=item.date===today;var isP=item.date<today;
    var d=new Date(item.date+'T00:00:00');
    var ds=isT?'⚡ AUJOURD\'HUI':d.toLocaleDateString('fr-CH',{weekday:'short',day:'2-digit',month:'long',year:'numeric'});
    var icon=isT?'⚠️':(isP?'✓':'🔔');
    return '<div class="rp-item'+(isT?' today':isP?' past':'')+'">'
      +'<div class="rp-icon">'+icon+'</div>'
      +'<div class="rp-info"><div class="rp-date'+(isT?' today':'')+'">'+ds+'</div><div class="rp-msg">'+esc(item.msg)+'</div></div>'
      +'<button class="rp-del" onclick="try{delRappel('+item.id+')}catch(e){}">✕</button>'
      +'</div>';
  }).join('');
}
function checkAlerts(){
  var today=new Date().toISOString().slice(0,10);
  var has=getRappels().some(function(r){return r.date===today;});
  var t=document.getElementById('tab4');
  if(t)t.classList.toggle('alert',has);
}

// ═══════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════
function goTab(idx,btn){
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.page').forEach(function(p,i){p.classList.toggle('active',i===idx);});
  activeTab=idx;
  if(idx===1)buildWeekView();
  if(idx===2)buildCopyView();
  if(idx===3){try{setPeriodDates();buildRapport();}catch(e){}}
  if(idx===4){buildRappels();}
}

//  INIT
// ═══════════════════════════════════════════
// ═══════════════════════════════════════
//  BACKUP
// ═══════════════════════════════════════
function backupData(){
  var backup={};
  for(var i=0;i<localStorage.length;i++){
    var k=localStorage.key(i);
    if(k&&k.startsWith('pmAlpes_')){
      try{backup[k]=JSON.parse(localStorage.getItem(k));}catch(e){}
    }
  }
  var json=JSON.stringify(backup,null,2);
  var blob=new Blob([json],{type:'application/json'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  var now=new Date();
  a.download='PMAlpes_Backup_'+now.toISOString().slice(0,10)+'.json';
  a.click();
  showToast('✓ Backup téléchargé');
}

function restoreBackup(file){
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=JSON.parse(e.target.result);
      Object.keys(data).forEach(function(k){
        localStorage.setItem(k,JSON.stringify(data[k]));
      });
      showToast('✓ Données restaurées !');
      loadWeek(0);buildDayStrip();buildDayView();
    }catch(err){showToast('Erreur: fichier invalide');}
  };
  reader.readAsText(file);
}

// ═══════════════════════════════════════
//  NOTES BANNER
// ═══════════════════════════════════════
function updateNotesBanner(di){
  var day=D.days[di];
  var banner=document.getElementById('notesBanner');
  var bannerText=document.getElementById('notesBannerText');
  if(!banner||!bannerText)return;
  if(day.notes&&day.notes.trim()){
    bannerText.textContent='⚠️ '+day.notes.trim();
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}

try{
  // Charger la semaine courante
  loadWeek(0);
  var dow=new Date().getDay();if(dow>=1&&dow<=5)activeDay=dow-1;

  // Restaurer le timer depuis localStorage
  restoreTimer();

  // Construire l'UI
  buildDayStrip();
  buildDayView();
  buildWeekView();
  buildCopyView();
  setPeriodDates();
  buildRappels();
  checkAlerts();
  updateBanner();

  // Démarrer l'intervalle si timer en cours
  if(runningTimer&&!tickInterval)tickInterval=setInterval(tick,1000);

  // Visibilité — quand on revient sur l'app
  document.addEventListener('visibilitychange',function(){
    try{
      if(document.visibilityState==='visible'){
        if(runningTimer){
          if(tickInterval){clearInterval(tickInterval);tickInterval=null;}
          tickInterval=setInterval(tick,1000);
          tick();updateBanner();
          buildDayStrip();buildDayView();
        }
      } else {
        if(runningTimer)save();
      }
    }catch(e){}
  });

  window.addEventListener('focus',function(){
    try{if(runningTimer){
      if(tickInterval){clearInterval(tickInterval);tickInterval=null;}
      tickInterval=setInterval(tick,1000);
      tick();
    }}catch(e){}
  });

  // Clique sur la semaine courante pour revenir
  document.getElementById('wkLabel').onclick=function(){if(weekOffset!==0)changeWeek(-weekOffset);};

  // Install banner
  try{
    var _ios=/iphone|ipad|ipod/i.test(navigator.userAgent);
    var _safari=/safari/i.test(navigator.userAgent);
    var _notchrome=!/chrome|crios|fxios/i.test(navigator.userAgent);
    var _standalone=window.navigator.standalone===true;
    var _dismissed=localStorage.getItem('installDismissed');
    if(_ios&&_safari&&_notchrome&&!_standalone&&!_dismissed){
      setTimeout(function(){var b=document.getElementById('installBanner');if(b)b.classList.add('show');},2500);
    }
    var _ib=document.getElementById('ibClose');
    if(_ib)_ib.onclick=function(){
      var b=document.getElementById('installBanner');if(b)b.classList.remove('show');
      localStorage.setItem('installDismissed','1');
    };
  }catch(e){}

}catch(e){console.error('Init error:',e.message,e.stack);}
